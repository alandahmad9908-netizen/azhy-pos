<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Azhy Cosmetic - Full Inventory System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap');
        :root { --p: #0f172a; --a: #3b82f6; --s: #10b981; --bg: #f1f5f9; --d: #ef4444; --w: #f59e0b; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--p); color: white; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); flex-shrink: 0; }
        .sidebar h2 { text-align: center; color: var(--a); border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .nav-btn { padding: 14px; margin: 10px 0; cursor: pointer; border-radius: 10px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-btn:hover, .nav-btn.active { background: var(--a); }
        .main { flex: 1; padding: 25px; overflow-y: auto; height: 100vh; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #f8fafc; color: #64748b; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-item { background: white; padding: 20px; border-radius: 12px; border-right: 5px solid var(--a); text-align: center; }
        .pos-layout { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .item-card { background: white; padding: 8px; border-radius: 12px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; position: relative; }
        .item-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; background: #eee; }
        .exp-badge { position: absolute; top: 5px; right: 5px; color: white; font-size: 10px; padding: 2px 6px; border-radius: 5px; font-weight: bold; }
        .exp-danger { background: var(--d); animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; width: 100%; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Azhy Cosmetic</h2>
        <div class="nav-btn active" onclick="showSec('pos', this)">🛒 فرۆشتن</div>
        <div class="nav-btn" onclick="showSec('inventory', this)">📦 کۆگا</div>
        <div class="nav-btn" onclick="showSec('reports', this)">📊 ڕاپۆرت</div>
        <div class="nav-btn" onclick="showSec('add', this)">➕ کاڵای نوێ</div>
    </div>

    <div class="main">
        <div id="pos" class="section active">
            <div class="pos-layout">
                <div>
                    <input type="text" id="pos-search" placeholder="🔍 گەڕان بەپێی ناو..." onkeyup="renderPOS()">
                    <div class="items-grid" id="pos-items"></div>
                </div>
                <div class="card">
                    <h3>وەسڵی کڕین</h3>
                    <div id="cart-list" style="min-height: 300px; max-height: 500px; overflow-y: auto;"></div>
                    <div style="border-top: 2px dashed #eee; padding-top: 15px; margin-top: 10px;">
                        <h2 style="display:flex; justify-content:space-between;"><span>کۆ:</span> <span id="total">0</span></h2>
                        <button class="btn" style="background:var(--s);" onclick="completeSale()">تەواوکردنی فرۆشتن</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="inventory" class="section">
            <div class="card">
                <input type="text" id="inv-search" placeholder="🔍 گەڕان لە کۆگا..." onkeyup="renderInventory()">
                <div class="stats-grid">
                    <div class="stat-item"><h4>مایای گشتی</h4><p id="stk-cost">0</p></div>
                    <div class="stat-item"><h4>فرۆشتنی گشتی</h4><p id="stk-sale">0</p></div>
                    <div class="stat-item"><h4>قازانج</h4><p id="stk-profit">0</p></div>
                </div>
                <table>
                    <thead><tr><th>وێنە</th><th>ناو</th><th>مایا</th><th>فرۆشتن</th><th>بڕ</th><th>بەسەرچوون</th><th>کردار</th></tr></thead>
                    <tbody id="inventory-table"></tbody>
                </table>
            </div>
        </div>

        <div id="reports" class="section">
            <div class="card">
                <h3>📊 ڕاپۆرت و گەڕان</h3>
                <input type="text" id="rep-search" placeholder="🔍 گەڕان لە ناو ڕاپۆرتەکان (ناوی کاڵا)..." onkeyup="renderReports()">
                <div class="stats-grid">
                    <div class="stat-item"><h4>ئەمڕۆ</h4><p id="p-day">0</p></div>
                    <div class="stat-item"><h4>ئەم مانگە</h4><p id="p-month">0</p></div>
                    <div class="stat-item"><h4>قازانجی گشتی</h4><p id="p-year">0</p></div>
                </div>
                <div style="max-height: 400px; overflow-y: auto;">
                    <table>
                        <thead><tr><th>بەروار</th><th>ناو</th><th>مایا</th><th>فرۆشتن</th><th>قازانج</th><th>کردار</th></tr></thead>
                        <tbody id="sales-history-table"></tbody>
                    </table>
                </div>
                <div style="margin-top:20px; display:flex; gap:10px;">
                    <button class="btn" style="background:var(--p)" onclick="backupData()">📥 باکئەپ</button>
                    <button class="btn" style="background:#64748b;" onclick="document.getElementById('importFile').click()">📤 گەڕاندنەوە</button>
                    <input type="file" id="importFile" style="display:none" onchange="restoreData(event)">
                </div>
            </div>
        </div>

        <div id="add" class="section">
            <div class="card" style="max-width: 500px; margin: auto;">
                <h3 id="form-title">تۆمارکردنی کاڵا</h3>
                <input type="hidden" id="edit-id">
                <input type="text" id="in-name" placeholder="ناوی کاڵا">
                <input type="number" id="in-cost" placeholder="نرخی مایا">
                <input type="number" id="in-sale" placeholder="نرخی فرۆشتن">
                <input type="number" id="in-qty" placeholder="بڕ">
                <input type="date" id="in-exp">
                <input type="file" id="in-img" accept="image/*">
                <button class="btn" style="background:var(--a);" onclick="addInv()">پاشەکەوت</button>
                <button class="btn" style="background:#64748b; margin-top:5px; display:none;" id="cancel-btn" onclick="cancelEdit()">لابردن</button>
            </div>
        </div>
    </div>

<script>
    let inventory = JSON.parse(localStorage.getItem('shop_v5_inv')) || [];
    let sales = JSON.parse(localStorage.getItem('shop_v5_sales')) || [];
    let cart = [];

    window.onload = () => { renderPOS(); };

    function showSec(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(btn) btn.classList.add('active');
        if(id === 'inventory') renderInventory();
        if(id === 'reports') renderReports();
    }

    function checkExpiry(expDate) {
        if(!expDate) return { status: 'none', text: '' };
        const diff = Math.ceil((new Date(expDate) - new Date()) / (1000 * 60 * 60 * 24));
        if(diff <= 0) return { status: 'danger', text: 'بەسەرچووە' };
        if(diff <= 30) return { status: 'danger', text: `${diff} ڕۆژ` };
        return { status: 'normal', text: expDate };
    }

    function addInv() {
        const id = document.getElementById('edit-id').value;
        const name = document.getElementById('in-name').value;
        const cost = parseFloat(document.getElementById('in-cost').value) || 0;
        const sale = parseFloat(document.getElementById('in-sale').value) || 0;
        const qty = parseInt(document.getElementById('in-qty').value) || 0;
        const exp = document.getElementById('in-exp').value;
        const file = document.getElementById('in-img').files[0];

        const saveProcess = (imgData) => {
            if(id) {
                const idx = inventory.findIndex(i => i.id == id);
                inventory[idx] = { ...inventory[idx], name, cost, sale, qty, exp, img: imgData || inventory[idx].img };
            } else {
                inventory.push({ id: Date.now(), name, cost, sale, qty, exp, img: imgData || 'https://via.placeholder.com/100', originalId: Date.now() });
            }
            save(); location.reload();
        };

        if(file) {
            const reader = new FileReader();
            reader.onload = (e) => saveProcess(e.target.result);
            reader.readAsDataURL(file);
        } else saveProcess();
    }

    function renderPOS() {
        const q = document.getElementById('pos-search').value.toLowerCase();
        document.getElementById('pos-items').innerHTML = inventory.filter(i => i.name.toLowerCase().includes(q) && i.qty > 0).map(i => {
            const exp = checkExpiry(i.exp);
            return `<div class="item-card" onclick="addToCart(${i.id})">
                ${exp.text ? `<span class="exp-badge exp-danger">${exp.text}</span>` : ''}
                <img src="${i.img}"><div>${i.name}</div>
                <div style="color:var(--a); font-weight:bold;">${i.sale.toLocaleString()}</div>
            </div>`;
        }).join('');
    }

    function addToCart(id) {
        const item = inventory.find(i => i.id === id);
        const exc = cart.find(c => c.id === id);
        if(exc) exc.count++; else cart.push({...item, count: 1, customPrice: item.sale});
        renderCart();
    }

    function renderCart() {
        document.getElementById('cart-list').innerHTML = cart.map((c, idx) => `
            <div style="display:grid; grid-template-columns: 2fr 1fr 0.3fr; gap:5px; padding:5px; border-bottom:1px solid #eee;">
                <span>${c.name} (x${c.count})</span>
                <input type="number" value="${c.customPrice}" oninput="cart[${idx}].customPrice=parseFloat(this.value)||0; calcTotal()">
                <span onclick="cart.splice(${idx},1); renderCart()" style="color:red; cursor:pointer;">✕</span>
            </div>`).join('');
        calcTotal();
    }

    function calcTotal() {
        const t = cart.reduce((s, i) => s + (i.customPrice * i.count), 0);
        document.getElementById('total').innerText = t.toLocaleString();
    }

    function completeSale() {
        if(!cart.length) return;
        cart.forEach(c => {
            const inv = inventory.find(i => i.id === c.id);
            if(inv) {
                inv.qty -= c.count;
                sales.push({ id: Date.now() + Math.random(), originalId: inv.id, name: c.name, cost: c.cost, sale: c.customPrice, profit: (c.customPrice - c.cost) * c.count, count: c.count, date: Date.now() });
            }
        });
        save(); cart = []; renderCart(); renderPOS(); alert("تەواو بوو");
    }

    function renderInventory() {
        const q = document.getElementById('inv-search').value.toLowerCase();
        let tc=0, ts=0, tp=0;
        document.getElementById('inventory-table').innerHTML = inventory.filter(i => i.name.toLowerCase().includes(q)).map(i => {
            tc += (i.cost * i.qty); ts += (i.sale * i.qty); tp += ((i.sale - i.cost) * i.qty);
            const exp = checkExpiry(i.exp);
            return `<tr>
                <td><img src="${i.img}" width="30"></td>
                <td>${i.name}</td><td>${i.cost.toLocaleString()}</td><td>${i.sale.toLocaleString()}</td><td>${i.qty}</td>
                <td style="color:${exp.status==='danger'?'red':'green'}">${exp.text || '-'}</td>
                <td><button onclick="editItem(${i.id})">دەستکاری</button></td>
            </tr>`;
        }).join('');
        document.getElementById('stk-cost').innerText = tc.toLocaleString();
        document.getElementById('stk-sale').innerText = ts.toLocaleString();
        document.getElementById('stk-profit').innerText = tp.toLocaleString();
    }

    function renderReports() {
        const q = document.getElementById('rep-search').value.toLowerCase();
        let d=0, m=0, y=0;
        const now = new Date();
        const filteredSales = sales.filter(s => s.name.toLowerCase().includes(q));

        document.getElementById('sales-history-table').innerHTML = filteredSales.sort((a,b)=>b.date-a.date).map(s => {
            const sd = new Date(s.date);
            if(sd.toDateString() === now.toDateString()) d += s.profit;
            if(sd.getMonth() === now.getMonth()) m += s.profit;
            y += s.profit;
            return `<tr>
                <td style="font-size: 0.85rem;">${sd.toLocaleDateString()}</td>
                <td>${s.name} (x${s.count})</td>
                <td>${s.cost.toLocaleString()}</td>
                <td>${s.sale.toLocaleString()}</td>
                <td style="color:green; font-weight:bold;">${s.profit.toLocaleString()}</td>
                <td><button onclick="deleteSale(${s.id})" style="background:none; border:none; color:red; cursor:pointer;">❌</button></td>
            </tr>`;
        }).join('');
        
        document.getElementById('p-day').innerText = d.toLocaleString();
        document.getElementById('p-month').innerText = m.toLocaleString();
        document.getElementById('p-year').innerText = y.toLocaleString();
    }

    function deleteSale(saleId) {
        if(confirm("ئەم فرۆشتنە بسڕێتەوە و کاڵاکە بگەڕێتەوە بۆ کۆگا؟")) {
            const idx = sales.findIndex(s => s.id == saleId);
            const s = sales[idx];
            const inv = inventory.find(i => i.id == s.originalId);
            if(inv) inv.qty += s.count;
            sales.splice(idx, 1);
            save(); renderReports();
        }
    }

    function editItem(id) {
        const item = inventory.find(i => i.id == id);
        document.getElementById('edit-id').value = item.id;
        document.getElementById('in-name').value = item.name;
        document.getElementById('in-cost').value = item.cost;
        document.getElementById('in-sale').value = item.sale;
        document.getElementById('in-qty').value = item.qty;
        document.getElementById('in-exp').value = item.exp || "";
        document.getElementById('cancel-btn').style.display = "block";
        showSec('add');
    }

    function save() {
        localStorage.setItem('shop_v5_inv', JSON.stringify(inventory));
        localStorage.setItem('shop_v5_sales', JSON.stringify(sales));
    }

    function backupData() {
        const blob = new Blob([JSON.stringify({ inventory, sales })], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `Backup_${new Date().toLocaleDateString()}.json`; a.click();
    }

    function restoreData(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const data = JSON.parse(ev.target.result);
            inventory = data.inventory || []; sales = data.sales || [];
            save(); location.reload();
        };
        reader.readAsText(e.target.files[0]);
    }
    
    function cancelEdit() {
        document.getElementById('edit-id').value = "";
        document.getElementById('cancel-btn').style.display = "none";
        showSec('inventory');
    }
</script>
</body>
</html>
