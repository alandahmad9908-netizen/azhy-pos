<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Azhy Cosmetic v7.5 - Final Stable</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap');
        :root { --p: #0f172a; --a: #3b82f6; --s: #10b981; --bg: #f1f5f9; --d: #ef4444; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--p); color: white; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); flex-shrink: 0; }
        .sidebar h2 { text-align: center; color: var(--a); border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .nav-btn { padding: 14px; margin: 10px 0; cursor: pointer; border-radius: 10px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-btn:hover, .nav-btn.active { background: var(--a); }
        .main { flex: 1; padding: 25px; overflow-y: auto; height: 100vh; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #f8fafc; color: #64748b; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-item { background: white; padding: 20px; border-radius: 12px; border-right: 5px solid var(--a); text-align: center; }
        .pos-layout { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .item-card { background: white; padding: 8px; border-radius: 12px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s; position: relative; font-size: 0.9rem; }
        .item-card:hover { border-color: var(--a); transform: translateY(-3px); }
        .item-card img { width: 100%; height: 90px; object-fit: cover; border-radius: 8px; background: #eee; }
        .exp-tag { position: absolute; top: 5px; right: 5px; background: var(--d); color: white; font-size: 9px; padding: 2px 5px; border-radius: 4px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; width: 100%; }
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .page-btn { padding: 5px 12px; background: white; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; }
        .page-btn.active { background: var(--a); color: white; border-color: var(--a); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Azhy Cosmetic</h2>
        <div class="nav-btn active" onclick="showSec('pos', this)">🛒 فرۆشتن</div>
        <div class="nav-btn" onclick="showSec('inventory', this)">📦 کۆگا</div>
        <div class="nav-btn" onclick="showSec('reports', this)">📊 ڕاپۆرت</div>
        <div class="nav-btn" onclick="showSec('add', this)">➕ کاڵای نوێ</div>
    </div>

    <div class="main">
        <div id="pos" class="section active">
            <div class="pos-layout">
                <div>
                    <input type="text" id="pos-search" placeholder="🔍 گەڕان بەپێی ناو..." onkeyup="renderPOS()">
                    <div class="items-grid" id="pos-items"></div>
                </div>
                <div class="card">
                    <h3>وەسڵی کڕین</h3>
                    <div id="cart-list" style="min-height: 200px; max-height: 400px; overflow-y: auto;"></div>
                    <div style="border-top: 2px dashed #eee; padding-top: 15px; margin-top: 10px;">
                        <h2 style="display:flex; justify-content:space-between;"><span>کۆی گشتی:</span> <span id="total">0</span></h2>
                        <button class="btn" style="background:var(--s);" onclick="completeSale()">تەواوکردنی فرۆشتن</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="inventory" class="section">
            <div class="card">
                <input type="text" id="inv-search" placeholder="🔍 گەڕان لە کۆگا..." onkeyup="renderInventory()">
                <div class="stats-grid">
                    <div class="stat-item"><h4>مایای گشتی</h4><p id="stk-cost">0</p></div>
                    <div class="stat-item"><h4>فرۆشتنی گشتی</h4><p id="stk-sale">0</p></div>
                    <div class="stat-item"><h4>قازانج</h4><p id="stk-profit">0</p></div>
                </div>
                <table>
                    <thead><tr><th>وێنە</th><th>ناو</th><th>مایا</th><th>فرۆشتن</th><th>بڕ</th><th>بەسەرچوون</th><th>کردار</th></tr></thead>
                    <tbody id="inventory-table"></tbody>
                </table>
            </div>
        </div>

        <div id="reports" class="section">
            <div class="card">
                <h3>📊 ڕاپۆرتی قازانج</h3>
                <div class="stats-grid">
                    <div class="stat-item"><h4>ئەمڕۆ</h4><p id="p-day">0</p></div>
                    <div class="stat-item"><h4>ئەم مانگە</h4><p id="p-month">0</p></div>
                    <div class="stat-item"><h4>ئەمساڵ</h4><p id="p-year">0</p></div>
                </div>
            </div>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>📜 مێژووی فرۆشتن</h3>
                    <input type="text" id="report-search" style="width:200px" placeholder="🔍 گەڕان..." onkeyup="currentPage=1; renderReports()">
                </div>
                <table>
                    <thead><tr><th>بەروار</th><th>ناو</th><th>مایا</th><th>فرۆشتن</th><th>قازانج</th><th>کردار</th></tr></thead>
                    <tbody id="sales-history-table"></tbody>
                </table>
                <div id="pagination" class="pagination"></div>
                <div style="margin-top:15px; display:flex; gap:10px;">
                    <button class="btn" style="background:var(--p)" onclick="backupData()">📥 باکئەپ</button>
                    <button class="btn" style="background:#64748b;" onclick="document.getElementById('importFile').click()">📤 گەڕاندنەوەی داتا</button>
                    <input type="file" id="importFile" style="display:none" onchange="restoreData(event)">
                    <button class="btn" style="background:var(--d)" onclick="if(confirm('دڵنیای هەموو مێژووی فرۆشتنەکان بسڕێتەوە؟')) {sales=[]; save(); renderReports();}">⚠️ پاککردنەوەی مێژوو</button>
                </div>
            </div>
        </div>

        <div id="add" class="section">
            <div class="card" style="max-width: 450px; margin: auto;">
                <h3>➕ زیادکردنی کاڵا</h3>
                <input type="text" id="in-name" placeholder="ناوی کاڵا">
                <input type="number" id="in-cost" placeholder="مایا">
                <input type="number" id="in-sale" placeholder="فرۆشتن">
                <input type="number" id="in-qty" placeholder="بڕ">
                <label>بەرواری بەسەرچوون:</label>
                <input type="date" id="in-expiry">
                <input type="file" id="in-img" accept="image/*">
                <button class="btn" style="background:var(--a)" onclick="addInv()">پاشەکەوت</button>
            </div>
        </div>
    </div>

<script>
    let inventory = JSON.parse(localStorage.getItem('shop_v5_inv')) || [];
    let sales = JSON.parse(localStorage.getItem('shop_v5_sales')) || [];
    let cart = [];
    let currentPage = 1;
    const rowsPerPage = 20;

    window.onload = () => { renderPOS(); };

    function showSec(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'inventory') renderInventory();
        if(id === 'reports') renderReports();
    }

    async function addInv() {
        const name = document.getElementById('in-name').value;
        const cost = parseFloat(document.getElementById('in-cost').value);
        const sale = parseFloat(document.getElementById('in-sale').value);
        const qty = parseInt(document.getElementById('in-qty').value);
        const exp = document.getElementById('in-expiry').value;
        const file = document.getElementById('in-img').files[0];
        if(!name || isNaN(cost)) return;
        
        let img = 'https://via.placeholder.com/100';
        if(file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                inventory.push({ id: Date.now(), name, cost, sale, qty, exp, img: e.target.result });
                save(); location.reload();
            };
        } else {
            inventory.push({ id: Date.now(), name, cost, sale, qty, exp, img });
            save(); location.reload();
        }
    }

    function renderPOS() {
        const q = document.getElementById('pos-search').value.toLowerCase();
        const grid = document.getElementById('pos-items');
        grid.innerHTML = inventory.filter(i => i.name.toLowerCase().includes(q) && i.qty > 0).map(i => `
            <div class="item-card" onclick="addToCart(${i.id})">
                ${i.exp ? `<span class="exp-tag">${i.exp}</span>` : ''}
                <img src="${i.img}">
                <div style="font-weight:bold">${i.name}</div>
                <div>${i.sale.toLocaleString()}</div>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const item = inventory.find(i => i.id === id);
        const exc = cart.find(c => c.id === id);
        if(exc) exc.count++; else cart.push({...item, count: 1});
        renderCart();
    }

    function renderCart() {
        const list = document.getElementById('cart-list');
        list.innerHTML = cart.map((c, idx) => `
            <div class="cart-row">
                <span>${c.name} (x${c.count})</span>
                <input type="number" value="${c.sale}" oninput="cart[${idx}].sale=parseFloat(this.value); calcTotal()">
                <span onclick="cart.splice(${idx},1); renderCart()" style="color:red; cursor:pointer;">✕</span>
            </div>
        `).join('');
        calcTotal();
    }

    function calcTotal() {
        document.getElementById('total').innerText = cart.reduce((s, i) => s + (i.sale * i.count), 0).toLocaleString();
    }

    function completeSale() {
        if(!cart.length) return;
        cart.forEach(c => {
            const inv = inventory.find(i => i.id === c.id);
            if(inv) {
                inv.qty -= c.count;
                sales.push({ id: Date.now(), name: c.name, cost: c.cost, sale: c.sale, profit: (c.sale - c.cost) * c.count, date: Date.now() });
            }
        });
        save(); cart = []; renderCart(); renderPOS(); alert("تەواو بوو");
    }

    function renderInventory() {
        const q = document.getElementById('inv-search').value.toLowerCase();
        const tb = document.getElementById('inventory-table');
        let tc=0, ts=0, tp=0;
        tb.innerHTML = inventory.filter(i => i.name.toLowerCase().includes(q)).map(i => {
            tc += (i.cost * i.qty); ts += (i.sale * i.qty); tp += ((i.sale - i.cost) * i.qty);
            return `<tr>
                <td><img src="${i.img}" width="30"></td>
                <td>${i.name}</td>
                <td>${i.cost.toLocaleString()}</td>
                <td>${i.sale.toLocaleString()}</td>
                <td><b>${i.qty}</b></td>
                <td style="color:red; font-size:0.8rem">${i.exp || '-'}</td>
                <td><button onclick="inventory=inventory.filter(x=>x.id!=${i.id});save();renderInventory();">❌</button></td>
            </tr>`;
        }).join('');
        document.getElementById('stk-cost').innerText = tc.toLocaleString();
        document.getElementById('stk-sale').innerText = ts.toLocaleString();
        document.getElementById('stk-profit').innerText = tp.toLocaleString();
    }

    function renderReports() {
        const q = document.getElementById('report-search').value.toLowerCase();
        const tb = document.getElementById('sales-history-table');
        const now = new Date();
        let d=0, m=0, y=0;

        sales.forEach(s => {
            const sd = new Date(s.date);
            if(sd.toDateString() === now.toDateString()) d += s.profit;
            if(sd.getMonth() === now.getMonth() && sd.getFullYear() === now.getFullYear()) m += s.profit;
            if(sd.getFullYear() === now.getFullYear()) y += s.profit;
        });

        const filtered = sales.filter(s => s.name.toLowerCase().includes(q)).sort((a,b) => b.date - a.date);
        const start = (currentPage - 1) * rowsPerPage;
        const paginated = filtered.slice(start, start + rowsPerPage);

        tb.innerHTML = paginated.map(s => `
            <tr><td>${new Date(s.date).toLocaleDateString('ku-IQ')}</td><td>${s.name}</td><td>${s.cost.toLocaleString()}</td><td>${s.sale.toLocaleString()}</td><td style="color:green; font-weight:bold">${s.profit.toLocaleString()}</td><td><button onclick="sales=sales.filter(x=>x.id!=${s.id});save();renderReports();">✕</button></td></tr>
        `).join('');

        renderPagination(filtered.length);
        document.getElementById('p-day').innerText = d.toLocaleString();
        document.getElementById('p-month').innerText = m.toLocaleString();
        document.getElementById('p-year').innerText = y.toLocaleString();
    }

    function renderPagination(totalItems) {
        const totalPages = Math.ceil(totalItems / rowsPerPage);
        const container = document.getElementById('pagination');
        container.innerHTML = '';
        if (totalPages <= 1) return;
        for (let i = 1; i <= Math.min(totalPages, 10); i++) {
            container.innerHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="currentPage=${i}; renderReports()">${i}</button>`;
        }
    }

    function save() {
        localStorage.setItem('shop_v5_inv', JSON.stringify(inventory));
        localStorage.setItem('shop_v5_sales', JSON.stringify(sales));
    }

    function backupData() {
        const blob = new Blob([JSON.stringify({ inventory, sales })], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `Backup_${new Date().toLocaleDateString()}.json`; a.click();
    }

    function restoreData(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const data = JSON.parse(ev.target.result);
            inventory = data.inventory || []; 
            sales = data.sales || [];
            save(); location.reload();
        };
        reader.readAsText(e.target.files[0]);
    }
</script>
</body>
</html>
